<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayDish | Smart Meal Planning</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        accent: {
                            500: '#8b5cf6', // Violet
                            600: '#7c3aed',
                        },
                        brand: {
                            dark: '#0f172a', // Slate 900
                            card: 'rgba(255, 255, 255, 0.03)',
                            border: 'rgba(255, 255, 255, 0.08)'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Phosphor Icons for elegant scalable icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-brand-dark text-slate-200 min-h-screen antialiased selection:bg-accent-500 selection:text-white flex flex-col items-center overflow-x-hidden relative">

    <!-- Ambient background glows -->
    <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-accent-600/10 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-blue-600/10 blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-5xl px-6 py-8 flex flex-col gap-10 relative z-10">
        
        <!-- Header -->
        <header class="flex items-center justify-between w-full fade-in-up" style="animation-delay: 0.1s;">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent-500 to-blue-500 flex items-center justify-center shadow-lg shadow-accent-500/20">
                    <i class="ph ph-cooking-pot text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-display font-semibold tracking-tight text-white">DayDish</h1>
            </div>
            <button class="w-10 h-10 rounded-full flex items-center justify-center bg-brand-card border border-brand-border hover:bg-white/10 transition-colors cursor-pointer">
                <i class="ph ph-user text-lg"></i>
            </button>
        </header>

        <!-- Top Section: Intake Card -->
        <section class="glass-card rounded-3xl p-8 sm:p-10 flex flex-col gap-6 fade-in-up" style="animation-delay: 0.2s;">
            <div class="flex flex-col gap-2">
                <h2 class="text-3xl font-display font-medium text-white">Tell us about your day</h2>
                <p class="text-slate-400 font-light">We'll craft the perfect meal plan to fit your schedule and budget.</p>
            </div>
            
            <div class="flex flex-col gap-5">
                <div class="relative group">
                    <textarea 
                        id="day-description"
                        rows="3" 
                        class="w-full bg-slate-900/50 border border-brand-border rounded-2xl p-5 text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-accent-500/50 focus:border-accent-500/50 transition-all resize-none font-light"
                        placeholder="e.g., Packed with back-to-back meetings until 6 PM, then gym, looking for high-protein meals..."
                    ></textarea>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-5 items-center justify-between">
                    <div class="relative flex items-center w-full sm:w-1/2 gap-2">
                        <select id="currency-select" class="bg-slate-900/50 border border-brand-border rounded-xl py-3 px-3 text-slate-200 focus:outline-none focus:ring-2 focus:ring-accent-500/50 focus:border-accent-500/50 transition-all font-light appearance-none cursor-pointer">
                            <option value="$">$ USD</option>
                            <option value="€">€ EUR</option>
                            <option value="£">£ GBP</option>
                            <option value="₹">₹ INR</option>
                        </select>
                        <div class="relative flex-1">
                            <i class="ph ph-wallet absolute left-3 top-3.5 text-slate-400 text-lg"></i>
                            <input 
                                type="number" 
                                id="daily-budget"
                                class="w-full bg-slate-900/50 border border-brand-border rounded-xl py-3 pl-10 pr-4 text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-accent-500/50 focus:border-accent-500/50 transition-all font-light"
                                placeholder="Daily Budget"
                            >
                        </div>
                    </div>
                    <button 
                        id="generate-btn"
                        class="w-full sm:w-auto bg-gradient-to-r from-accent-600 to-accent-500 hover:from-accent-500 hover:to-accent-400 text-white font-medium px-8 py-3.5 rounded-xl shadow-lg shadow-accent-500/25 transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2"
                    >
                        <i class="ph ph-sparkle text-lg"></i>
                        <span>Plan My Meals</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Main Section: 4-Grid Dashboard (Hidden by default) -->
        <section id="dashboard" class="hidden flex-col gap-6 w-full">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-display font-medium text-white">Your Daily Blueprint</h3>
                <span id="generation-status" class="text-sm text-accent-400 font-medium flex items-center gap-2">
                    <i class="ph ph-spinner-gap animate-spin"></i> Generating...
                </span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- Grid 1: Schedule -->
                <div class="glass-card rounded-2xl p-6 flex flex-col gap-4">
                    <div class="flex items-center gap-3 text-white mb-2">
                        <i class="ph ph-clock text-xl text-blue-400"></i>
                        <h4 class="font-display font-medium text-lg">Schedule</h4>
                    </div>
                    
                    <!-- Skeletons -->
                    <div class="skeleton-group flex flex-col gap-3">
                        <div class="h-16 w-full bg-slate-800/50 rounded-xl animate-pulse"></div>
                        <div class="h-16 w-full bg-slate-800/50 rounded-xl animate-pulse" style="animation-delay: 0.1s;"></div>
                        <div class="h-16 w-full bg-slate-800/50 rounded-xl animate-pulse" style="animation-delay: 0.2s;"></div>
                    </div>

                    <!-- Content (Hidden initially) -->
                    <div class="content-group hidden flex-col gap-3" id="schedule-content">
                        <!-- Items injected by JS -->
                    </div>
                </div>

                <!-- Grid 2: Grocery List -->
                <div class="glass-card rounded-2xl p-6 flex flex-col gap-4">
                    <div class="flex items-center gap-3 text-white mb-2">
                        <i class="ph ph-shopping-cart text-xl text-emerald-400"></i>
                        <h4 class="font-display font-medium text-lg">Grocery List</h4>
                    </div>
                    
                    <div class="skeleton-group flex flex-col gap-4">
                        <div class="h-4 w-1/3 bg-slate-800/50 rounded animate-pulse"></div>
                        <div class="flex flex-col gap-2">
                            <div class="h-8 w-full bg-slate-800/50 rounded-lg animate-pulse"></div>
                            <div class="h-8 w-3/4 bg-slate-800/50 rounded-lg animate-pulse" style="animation-delay: 0.1s;"></div>
                        </div>
                        <div class="h-4 w-1/4 bg-slate-800/50 rounded animate-pulse mt-2"></div>
                        <div class="h-8 w-full bg-slate-800/50 rounded-lg animate-pulse" style="animation-delay: 0.2s;"></div>
                    </div>

                    <div class="content-group hidden flex-col gap-5" id="grocery-content">
                        <!-- Items injected by JS -->
                    </div>
                </div>

                <!-- Grid 3: Substitutions Panel -->
                <div class="glass-card rounded-2xl p-6 flex flex-col gap-4">
                    <div class="flex items-center gap-3 text-white mb-2">
                        <i class="ph ph-arrows-left-right text-xl text-orange-400"></i>
                        <h4 class="font-display font-medium text-lg">Smart Substitutions</h4>
                    </div>
                    
                    <div class="skeleton-group flex flex-col gap-3">
                        <div class="h-14 w-full bg-slate-800/50 rounded-xl animate-pulse"></div>
                        <div class="h-14 w-full bg-slate-800/50 rounded-xl animate-pulse" style="animation-delay: 0.1s;"></div>
                    </div>

                    <div class="content-group hidden flex-col gap-3" id="substitutions-content">
                        <!-- Items injected by JS -->
                    </div>
                </div>

                <!-- Grid 4: Budget Status -->
                <div class="glass-card rounded-2xl p-6 flex flex-col gap-4">
                    <div class="flex items-center gap-3 text-white mb-2">
                        <i class="ph ph-chart-pie-slice text-xl text-accent-400"></i>
                        <h4 class="font-display font-medium text-lg">Budget Feasibility</h4>
                    </div>
                    
                    <div class="skeleton-group flex flex-col items-center justify-center py-4 gap-4 w-full">
                        <div class="relative w-32 h-16 bg-slate-800/50 rounded-t-full overflow-hidden animate-pulse">
                        </div>
                        <div class="h-4 w-1/2 bg-slate-800/50 rounded animate-pulse"></div>
                    </div>

                    <div class="content-group hidden flex-col items-center justify-center py-2 gap-4 w-full" id="budget-content">
                        <!-- Items injected by JS -->
                    </div>
                </div>

            </div>
        </section>
        
    </div>

    <script src="app.js"></script>
</body>
</html>
